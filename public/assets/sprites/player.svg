<svg xmlns="http://www.w3.org/2000/svg" width="260" height="340" viewBox="0 0 260 340">
  <defs>
    <linearGradient id="pJacket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#23272d"/>
      <stop offset="1" stop-color="#0c0e11"/>
    </linearGradient>
    <radialGradient id="pSkin" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#9a7d6a"/>
      <stop offset="0.7" stop-color="#6e564708"/>
      <stop offset="0.7" stop-color="#6e5647"/>
      <stop offset="1" stop-color="#3e2f26"/>
    </radialGradient>
    <linearGradient id="pMask" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3d42"/>
      <stop offset="1" stop-color="#16181c"/>
    </linearGradient>
  </defs>
  <!-- layered paper shadow -->
  <path d="M40 332 C46 234 76 198 130 198 C184 198 214 234 220 332 Z" fill="#000" opacity="0.45" transform="translate(6 6)"/>
  <!-- jacket -->
  <path d="M36 332 C42 232 72 196 130 196 C188 196 218 232 224 332 Z" fill="url(#pJacket)" stroke="#000" stroke-width="6"/>
  <!-- collar -->
  <path d="M130 200 L106 248 L130 264 L154 248 Z" fill="#2c3036" stroke="#000" stroke-width="4"/>
  <path d="M130 206 L116 242 L130 254 L144 242 Z" fill="#101216"/>
  <!-- neck -->
  <rect x="114" y="170" width="32" height="34" fill="#4a3a30" stroke="#000" stroke-width="4"/>
  <!-- head -->
  <ellipse cx="130" cy="120" rx="54" ry="60" fill="url(#pSkin)" stroke="#000" stroke-width="5"/>
  <!-- hair / hood -->
  <path d="M76 116 C76 60 104 44 130 44 C156 44 184 60 184 116 C162 92 152 86 130 86 C108 86 98 92 76 116 Z" fill="#14110e" stroke="#000" stroke-width="4"/>
  <!-- breathing mask (dark, not green) -->
  <path d="M84 128 C98 156 106 170 130 170 C154 170 162 156 176 128 C162 158 160 186 130 186 C100 186 98 158 84 128 Z" fill="url(#pMask)" stroke="#000" stroke-width="4"/>
  <!-- mask filter canister -->
  <circle cx="130" cy="170" r="11" fill="#26292e" stroke="#000" stroke-width="3"/>
  <circle cx="130" cy="170" r="4" fill="#9e2a22"/>
  <!-- mask strap highlight -->
  <path d="M86 130 L174 130 L170 142 L90 142 Z" fill="#43464c" stroke="#000" stroke-width="2"/>
  <!-- eyes (tense) -->
  <ellipse cx="110" cy="116" rx="10" ry="7" fill="#0a0c0f"/>
  <ellipse cx="150" cy="116" rx="10" ry="7" fill="#0a0c0f"/>
  <circle cx="112" cy="114" r="2.6" fill="#cdc6b8"/>
  <circle cx="152" cy="114" r="2.6" fill="#cdc6b8"/>
  <!-- furrowed brow -->
  <path d="M98 100 L122 108" stroke="#14110e" stroke-width="6" stroke-linecap="round"/>
  <path d="M162 100 L138 108" stroke="#14110e" stroke-width="6" stroke-linecap="round"/>
  <!-- sweat bead -->
  <ellipse cx="92" cy="128" rx="3" ry="5" fill="#9fb6c4" opacity="0.7"/>
</svg>
